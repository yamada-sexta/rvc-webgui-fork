name: Deploy Web To GitHub Pages

on:
    push:
        branches:
            - main
        paths:
            - "web/**"
            - ".github/workflows/deploy-web-pages.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        name: Build Web
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: web

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Build
              env:
                  VITE_BASE_PATH: /rvc-webgui-fork/
              run: bun run build

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: web/dist

    deploy:
        name: Deploy To Pages
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4
